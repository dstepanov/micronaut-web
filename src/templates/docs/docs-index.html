<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="{{pageDescription}}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="{{assetBasePath}}/micronaut-assets/icons/micronaut-sally.svg" />
    {{headAssetsHtml}}
    {{themeScriptHtml}}
    <title>{{pageTitle}}</title>
  </head>
  <body>
    <div class="min-h-screen bg-background text-foreground" data-micronaut-template="docs-index">
      <div
        data-slot="sidebar-wrapper"
        class="group/sidebar-wrapper flex min-h-svh w-full has-data-[variant=inset]:bg-sidebar"
        style="--sidebar-width: 248px; --sidebar-width-icon: 56px;"
      >
        {{sidebarHtml}}
        <main data-slot="sidebar-inset" class="relative flex w-full flex-1 flex-col bg-background">
          {{topNavigationHtml}}
          <section class="mx-auto grid w-full max-w-[1346px] gap-6 px-5 py-7 md:px-6" data-document-content>
            {{contentHtml}}
          </section>
        </main>
      </div>
      <script type="application/json" id="micronaut-search-index">{{searchIndexJson}}</script>
      {{bodyScriptsHtml}}
    </div>
  </body>
</html>
