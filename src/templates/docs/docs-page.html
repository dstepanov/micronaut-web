<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="description" content="{{pageDescription}}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="{{assetBasePath}}/micronaut-assets/icons/micronaut-sally.svg" />
    {{headAssetsHtml}}
    {{themeScriptHtml}}
    <title>{{pageTitle}}</title>
  </head>
  <body>
    <div class="min-h-screen bg-background text-foreground" data-micronaut-template="docs-page">
      <div
        data-slot="sidebar-wrapper"
        class="group/sidebar-wrapper flex min-h-svh w-full has-data-[variant=inset]:bg-sidebar"
        style="--sidebar-width: 248px; --sidebar-width-icon: 56px;"
      >
        {{sidebarHtml}}
        <main data-slot="sidebar-inset" class="relative flex w-full flex-1 flex-col bg-background">
          {{topNavigationHtml}}
          <article class="mx-auto grid w-full max-w-[1180px] grid-cols-1 gap-8 px-4 py-8 md:px-6 xl:grid-cols-[minmax(0,1fr)_240px]">
            <div class="min-w-0" data-document-content>
              {{contentHtml}}
            </div>
            <aside class="hidden xl:block" data-content-submenu>
              {{contentSubmenuHtml}}
            </aside>
          </article>
        </main>
      </div>
      <script type="application/json" id="micronaut-search-index">{{searchIndexJson}}</script>
      {{bodyScriptsHtml}}
    </div>
  </body>
</html>
