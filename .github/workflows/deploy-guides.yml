name: Deploy Guides

on:
  workflow_dispatch:
    inputs:
      target_repository:
        description: Repository that owns the guides GitHub Pages branch
        required: false
        default: dstepanov/micronaut-guides
      target_branch:
        description: GitHub Pages source branch in the guides repository
        required: false
        default: gh-pages
      guides_repository:
        description: Guides repository to build from
        required: false
        default: micronaut-projects/micronaut-guides
      guides_ref:
        description: Guides branch, tag, or SHA to build from
        required: false
        default: master

permissions:
  contents: write

concurrency:
  group: guides-pages
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish guides
    runs-on: ubuntu-latest
    steps:
      - name: Check out Micronaut web
        uses: actions/checkout@v6

      - name: Validate target repository token
        env:
          HAS_TARGET_REPOSITORY_TOKEN: ${{ secrets.TARGET_REPOSITORY_TOKEN != '' }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
        run: |
          if [ "$TARGET_REPOSITORY" != "$GITHUB_REPOSITORY" ] && [ "$HAS_TARGET_REPOSITORY_TOKEN" != "true" ]; then
            echo "::error::Set TARGET_REPOSITORY_TOKEN with contents:write access to $TARGET_REPOSITORY, or run this workflow from the target repository."
            exit 1
          fi

      - name: Check out guides Pages repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target_repository }}
          ref: ${{ inputs.target_branch }}
          path: published-guides
          token: ${{ secrets.TARGET_REPOSITORY_TOKEN || github.token }}

      - name: Check out guides project
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.guides_repository }}
          ref: ${{ inputs.guides_ref }}
          path: ${{ runner.temp }}/micronaut-guides

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Configure GitHub Pages origin
        env:
          CONFIGURED_GITHUB_PAGES_ORIGIN: ${{ vars.MICRONAUT_GITHUB_PAGES_ORIGIN || vars.DEFAULT_GITHUB_PAGES_ORIGIN }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
        run: |
          target_owner="${TARGET_REPOSITORY%%/*}"
          default_github_pages_origin="https://${target_owner}.github.io"
          github_pages_origin="${CONFIGURED_GITHUB_PAGES_ORIGIN:-$default_github_pages_origin}"
          echo "DEFAULT_GITHUB_PAGES_ORIGIN=$default_github_pages_origin" >> "$GITHUB_ENV"
          echo "MICRONAUT_GITHUB_PAGES_ORIGIN=$github_pages_origin" >> "$GITHUB_ENV"

      - name: Build guides surface
        env:
          ASTRO_BASE: /micronaut-guides/
          MICRONAUT_DEPLOY_SURFACE: guides
          MICRONAUT_GUIDES_ROOT: /latest
          MICRONAUT_GUIDES_LATEST_ROOT: /latest
          MICRONAUT_GUIDES_DIR: ${{ runner.temp }}/micronaut-guides
          GUIDES_RENDER_ALL: "true"
          GUIDES_RENDER_STRICT: "true"
        run: npm run build:guides

      - name: Replace guides Pages artifact
        run: |
          find published-guides -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. published-guides/

      - name: Commit and push guides Pages branch
        working-directory: published-guides
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Publish Micronaut guides from ${{ inputs.guides_ref }}"
            git push origin HEAD:${{ inputs.target_branch }}
          else
            echo "Guides Pages branch is already up to date."
          fi
