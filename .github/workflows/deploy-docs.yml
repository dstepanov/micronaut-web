name: Deploy Docs

on:
  workflow_dispatch:
    inputs:
      docs_version:
        description: Version folder to publish, for example 4.10.14
        required: true
      publish_latest:
        description: Also update /latest to this version
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      target_repository:
        description: Repository that owns the docs GitHub Pages branch
        required: false
        default: dstepanov/micronaut-docs
      target_branch:
        description: GitHub Pages source branch in the docs repository
        required: false
        default: gh-pages
      platform_repository:
        description: Platform repository used for docs metadata and sources
        required: false
        default: micronaut-projects/micronaut-platform
      platform_ref:
        description: Optional platform branch, tag, or SHA. Defaults to docs_version, with v-prefixed tag fallback.
        required: false

permissions:
  contents: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out Micronaut web
        uses: actions/checkout@v6

      - name: Validate target repository token
        env:
          HAS_TARGET_REPOSITORY_TOKEN: ${{ secrets.TARGET_REPOSITORY_TOKEN != '' }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
        run: |
          if [ "$TARGET_REPOSITORY" != "$GITHUB_REPOSITORY" ] && [ "$HAS_TARGET_REPOSITORY_TOKEN" != "true" ]; then
            echo "::error::Set TARGET_REPOSITORY_TOKEN with contents:write access to $TARGET_REPOSITORY, or run this workflow from the target repository."
            exit 1
          fi

      - name: Check out docs Pages repository
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target_repository }}
          ref: ${{ inputs.target_branch }}
          path: published-docs
          token: ${{ secrets.TARGET_REPOSITORY_TOKEN || github.token }}

      - name: Check out platform project
        env:
          DOCS_VERSION: ${{ inputs.docs_version }}
          PLATFORM_REPOSITORY: ${{ inputs.platform_repository }}
          PLATFORM_REF: ${{ inputs.platform_ref }}
        run: |
          set -euo pipefail
          target="external/docs/repos/micronaut-platform"
          repo_url="https://github.com/${PLATFORM_REPOSITORY}.git"
          effective_ref="${PLATFORM_REF:-$DOCS_VERSION}"
          mkdir -p "$(dirname "$target")"
          git init --initial-branch=checkout "$target"
          git -C "$target" remote add origin "$repo_url"
          echo "Resolving $PLATFORM_REPOSITORY ref '$effective_ref'."

          if git -C "$target" ls-remote --exit-code --heads origin "$effective_ref" >/dev/null; then
            git -C "$target" fetch --depth=1 origin "refs/heads/${effective_ref}:refs/remotes/origin/${effective_ref}"
            git -C "$target" checkout --detach "refs/remotes/origin/${effective_ref}"
          else
            resolved_tag="$effective_ref"
            if ! git -C "$target" ls-remote --exit-code --tags origin "$resolved_tag" >/dev/null; then
              if [ "${effective_ref#v}" = "$effective_ref" ] && git -C "$target" ls-remote --exit-code --tags origin "v$effective_ref" >/dev/null; then
                resolved_tag="v$effective_ref"
              fi
            fi

            if git -C "$target" ls-remote --exit-code --tags origin "$resolved_tag" >/dev/null; then
              git -C "$target" fetch --depth=1 origin "refs/tags/${resolved_tag}:refs/tags/${resolved_tag}"
              git -C "$target" checkout --detach "refs/tags/${resolved_tag}"
            else
              if ! git -C "$target" fetch --depth=1 origin "$effective_ref"; then
                echo "::error::Could not resolve $PLATFORM_REPOSITORY ref '$effective_ref' as a branch, tag, v-prefixed tag, raw ref, or SHA."
                exit 1
              fi
              git -C "$target" checkout --detach FETCH_HEAD
            fi
          fi

          git -C "$target" rev-parse --short HEAD

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Configure GitHub Pages origin
        env:
          CONFIGURED_GITHUB_PAGES_ORIGIN: ${{ vars.MICRONAUT_GITHUB_PAGES_ORIGIN || vars.DEFAULT_GITHUB_PAGES_ORIGIN }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
        run: |
          target_owner="${TARGET_REPOSITORY%%/*}"
          default_github_pages_origin="https://${target_owner}.github.io"
          github_pages_origin="${CONFIGURED_GITHUB_PAGES_ORIGIN:-$default_github_pages_origin}"
          echo "DEFAULT_GITHUB_PAGES_ORIGIN=$default_github_pages_origin" >> "$GITHUB_ENV"
          echo "MICRONAUT_GITHUB_PAGES_ORIGIN=$github_pages_origin" >> "$GITHUB_ENV"

      - name: Build docs version manifest
        run: node scripts/update-docs-version-manifest.ts --published-dir published-docs --version "${{ inputs.docs_version }}" --latest "${{ inputs.publish_latest }}"

      - name: Build docs surface
        env:
          ASTRO_BASE: /micronaut-docs/
          MICRONAUT_DEPLOY_SURFACE: docs
          MICRONAUT_DOCS_ROOT: /${{ inputs.docs_version }}
          MICRONAUT_DOCS_LATEST_ROOT: /latest
          DOCS_DIR: ${{ github.workspace }}/external/docs
          DOCS_RENDER_ALL: "true"
          DOCS_RENDER_STRICT: "true"
          DOCS_SYNC_SOURCES: "true"
        run: npm run build:docs

      - name: Merge docs artifact
        run: node scripts/publish-docs-surface.ts --dist dist --published-dir published-docs --version "${{ inputs.docs_version }}" --latest "${{ inputs.publish_latest }}" --base /micronaut-docs/

      - name: Commit and push docs Pages branch
        working-directory: published-docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Publish Micronaut docs ${{ inputs.docs_version }}"
            git push origin HEAD:${{ inputs.target_branch }}
          else
            echo "Docs Pages branch is already up to date."
          fi
