name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Check out platform project
        run: |
          mkdir -p "$RUNNER_TEMP/docs/repos"
          git clone --depth 1 https://github.com/micronaut-projects/micronaut-platform.git "$RUNNER_TEMP/docs/repos/micronaut-platform"

      - name: Check out guides project
        run: git clone --depth 1 https://github.com/micronaut-projects/micronaut-guides.git "$RUNNER_TEMP/micronaut-guides"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Configure GitHub Pages paths
        env:
          CONFIGURED_GITHUB_PAGES_ORIGIN: ${{ vars.MICRONAUT_GITHUB_PAGES_ORIGIN || vars.DEFAULT_GITHUB_PAGES_ORIGIN }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "ASTRO_BASE=/" >> "$GITHUB_ENV"
          else
            echo "ASTRO_BASE=/$repo_name/" >> "$GITHUB_ENV"
          fi
          default_github_pages_origin="https://${GITHUB_REPOSITORY_OWNER}.github.io"
          github_pages_origin="${CONFIGURED_GITHUB_PAGES_ORIGIN:-$default_github_pages_origin}"
          echo "DEFAULT_GITHUB_PAGES_ORIGIN=$default_github_pages_origin" >> "$GITHUB_ENV"
          echo "MICRONAUT_GITHUB_PAGES_ORIGIN=$github_pages_origin" >> "$GITHUB_ENV"

      - name: Build web
        env:
          DOCS_DIR: ${{ runner.temp }}/docs
          DOCS_RENDER_ALL: "true"
          DOCS_RENDER_STRICT: "true"
          DOCS_SYNC_SOURCES: "true"
          MICRONAUT_GUIDES_DIR: ${{ runner.temp }}/micronaut-guides
          GUIDES_RENDER_ALL: "true"
          GUIDES_RENDER_STRICT: "true"
          MICRONAUT_DEPLOY_SURFACE: main
        run: npm run build:main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_TOKEN != '' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
