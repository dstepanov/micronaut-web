name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Configure Astro base path
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "ASTRO_BASE=/" >> "$GITHUB_ENV"
          else
            echo "ASTRO_BASE=/$repo_name/" >> "$GITHUB_ENV"
          fi

      - name: Build web
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_TOKEN != '' }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
