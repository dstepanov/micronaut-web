name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target_branch:
        description: GitHub Pages source branch in this repository
        required: false
        default: gh-pages

permissions:
  contents: write

concurrency:
  group: web-pages
  cancel-in-progress: false

jobs:
  publish:
    name: Build and publish web
    runs-on: ubuntu-latest
    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAGES_TOKEN || github.token }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Configure GitHub Pages paths
        env:
          CONFIGURED_GITHUB_PAGES_ORIGIN: ${{ vars.MICRONAUT_GITHUB_PAGES_ORIGIN || vars.DEFAULT_GITHUB_PAGES_ORIGIN }}
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            echo "ASTRO_BASE=/" >> "$GITHUB_ENV"
          else
            echo "ASTRO_BASE=/$repo_name/" >> "$GITHUB_ENV"
          fi
          default_github_pages_origin="https://${GITHUB_REPOSITORY_OWNER}.github.io"
          github_pages_origin="${CONFIGURED_GITHUB_PAGES_ORIGIN:-$default_github_pages_origin}"
          echo "DEFAULT_GITHUB_PAGES_ORIGIN=$default_github_pages_origin" >> "$GITHUB_ENV"
          echo "MICRONAUT_GITHUB_PAGES_ORIGIN=$github_pages_origin" >> "$GITHUB_ENV"

      - name: Build web
        env:
          MICRONAUT_DEPLOY_SURFACE: main
        run: npm run build:main

      - name: Prepare web Pages branch
        env:
          TARGET_BRANCH: ${{ inputs.target_branch || 'gh-pages' }}
        run: |
          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$TARGET_BRANCH"
            git worktree add published-web FETCH_HEAD
          else
            git worktree add --detach published-web
            git -C published-web checkout --orphan "$TARGET_BRANCH"
            git -C published-web rm -rf . || true
          fi

      - name: Replace web Pages artifact
        run: |
          find published-web -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R dist/. published-web/

      - name: Commit and push web Pages branch
        working-directory: published-web
        env:
          TARGET_BRANCH: ${{ inputs.target_branch || 'gh-pages' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Publish Micronaut web from ${GITHUB_SHA::12}"
            git push origin HEAD:"$TARGET_BRANCH"
          else
            echo "Web Pages branch is already up to date."
          fi
